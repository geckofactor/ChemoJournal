<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChemoJournal Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 16px;
      background: #1e293b;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 16px;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input, textarea, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 8px;
      border: none;
      background: #0f172a;
      color: #e2e8f0;
    }

    button {
      margin-top: 12px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .entry {
      background: #0f172a;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    .small {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<header>ChemoJournal Daily Tracker</header>

<div class="container">

  <div class="card">
    <h3>Log Today</h3>

    <label>Energy (1-10)</label>
    <input id="energy" type="number" min="1" max="10"/>

    <label>Nausea (0-10)</label>
    <input id="nausea" type="number" min="0" max="10"/>

    <label>Appetite (0-10)</label>
    <input id="appetite" type="number" min="0" max="10"/>

    <!-- ✅ ADDED: Signatera -->
    <label>Signatera (ctDNA)</label>
    <input id="signatera" type="number" step="0.01" placeholder="e.g. 0.09"/>

    <!-- ✅ ADDED: Fever toggle -->
    <label>Fever today?</label>
    <select id="fever" onchange="toggleTemp()">
      <option value="no">No</option>
      <option value="yes">Yes</option>
    </select>

    <!-- ✅ ADDED: Temperature input -->
    <div id="tempBox" style="display:none;">
      <label>Temperature (°F)</label>
      <input id="temp" type="number" step="0.1"/>
    </div>

    <label>Notes</label>
    <textarea id="notes"></textarea>

    <button onclick="saveEntry()">Save Entry</button>
  </div>

  <div class="card">
    <h3>Past Entries</h3>
    <div id="entries"></div>
    <button onclick="clearData()">Clear All Data</button>
  </div>

</div>

<script>
  function getData() {
    return JSON.parse(localStorage.getItem("chemoEntries") || "[]");
  }

  function toggleTemp() {
    const fever = document.getElementById("fever").value;
    document.getElementById("tempBox").style.display =
      fever === "yes" ? "block" : "none";
  }

  function saveEntry() {
    const entry = {
      date: new Date().toLocaleString(),
      energy: document.getElementById("energy").value,
      nausea: document.getElementById("nausea").value,
      appetite: document.getElementById("appetite").value,

      // ✅ ADDED ONLY THESE TWO
      signatera: document.getElementById("signatera").value,
      fever: document.getElementById("fever").value,
      temp: document.getElementById("temp").value,

      notes: document.getElementById("notes").value
    };

    const data = getData();
    data.unshift(entry);
    localStorage.setItem("chemoEntries", JSON.stringify(data));

    render();
  }

  function render() {
    const entries = getData();
    const container = document.getElementById("entries");

    container.innerHTML = entries.map(e => `
      <div class="entry">
        <div class="small">${e.date}</div>
        <div>Energy: ${e.energy}/10 | Nausea: ${e.nausea}/10 | Appetite: ${e.appetite}/10</div>

        <!-- ✅ ADDED DISPLAY ONLY -->
        <div>Signatera: ${e.signatera || "N/A"}</div>
        <div>
          Fever: ${e.fever === "yes" ? "YES" : "No"}
          ${e.temp ? " (" + e.temp + "°F)" : ""}
        </div>

        <div>Notes: ${e.notes}</div>
      </div>
    `).join("");
  }

  function clearData() {
    localStorage.removeItem("chemoEntries");
    render();
  }

  render();
</script>

</body>
</html>
