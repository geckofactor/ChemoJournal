<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f6f3ef;
    color: #2b2b2b;
  }

  .container {
    max-width: 800px;
    margin: auto;
    padding: 16px;
  }

  .title {
    font-size: 22px;
    font-weight: 600;
    margin: 10px 0 14px;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  button {
    background: #2b2b2b;
    color: white;
    border: none;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.9;
  }

  .row {
    display: flex;
    gap: 8px;
  }

  .row button {
    flex: 1;
  }

  .entry {
    padding: 10px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }

  .meta {
    font-size: 12px;
    color: #666;
  }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    background: #eee;
    margin-left: 6px;
  }

  .bigDate {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
</style>
</head>

<body>
<div class="container">

  <div class="title">🌿 ChemoJournal</div>

    <div class="bigDate" id="bigDate"></div>
