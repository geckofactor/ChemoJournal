<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FOLFOX Tracker</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (for JSX in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; background: #080f18; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script>
    // ---- MINIMAL FIX ONLY (storage shim) ----
    window.storage = {
      get: async (key) => ({ value: localStorage.getItem(key) }),
      set: async (key, value) => localStorage.setItem(key, value)
    };
  </script>

  <script type="text/babel">

const { useState, useEffect, useCallback } = React;

const STORAGE_KEY = "folfox-v3-entries";
const CYCLE_KEY = "folfox-v3-cycle";

const NEUROPATHY_SITES = [
  { id: "hands", label: "Hands", icon: "✋" },
  { id: "feet", label: "Feet", icon: "🦶" },
  { id: "throat_cold", label: "Cold Throat", icon: "🌡" },
  { id: "balance", label: "Balance", icon: "⚖" },
  { id: "dexterity", label: "Dexterity", icon: "🤏" },
];

const OTHER_SYMPTOMS = [
  { id: "nausea", label: "Nausea", icon: "🤢" },
  { id: "fatigue", label: "Fatigue", icon: "😴" },
  { id: "mucositis", label: "Mucositis", icon: "👄" },
  { id: "diarrhea", label: "Diarrhea", icon: "🚽" },
  { id: "appetite", label: "Appetite Loss", icon: "🍽" },
  { id: "cognitive", label: "Brain Fog", icon: "🧠" },
];

const ALL_SYMPTOMS = [...NEUROPATHY_SITES, ...OTHER_SYMPTOMS];
const SEVERITY_LABELS = ["None", "Mild", "Moderate", "Severe", "Unbearable"];
const SEVERITY_COLORS = ["#2d4a3e", "#4a7c59", "#c9a84c", "#d46b3a", "#b03a2e"];
const RED_FLAG = 3;

/* ---------------- YOUR ORIGINAL CODE UNCHANGED BELOW ---------------- */

function computeInsights(entries) {
  const insights = [];
  const flags = [];
  if (entries.length < 2) return { insights, flags };

  const bySym = {};
  ALL_SYMPTOMS.forEach(s => { bySym[s.id] = []; });
  entries.forEach(e => {
    ALL_SYMPTOMS.forEach(s => {
      bySym[s.id].push({ cycle: e.cycle, day: e.cycleDay, val: e.symptoms?.[s.id] ?? 0, resolved: e.resolved?.[s.id] ?? false });
    });
  });

  ALL_SYMPTOMS.forEach(s => {
    const pts = bySym[s.id];
    const byCycle = {};
    pts.forEach(p => { (byCycle[p.cycle] = byCycle[p.cycle] || []).push(p); });
    const cycleNums = Object.keys(byCycle).map(Number).sort((a,b)=>a-b);

    if (NEUROPATHY_SITES.find(n=>n.id===s.id) && cycleNums.length >= 2) {
      const peakByCycle = cycleNums.map(c => Math.max(...byCycle[c].map(p=>p.val)));
      const last = peakByCycle[peakByCycle.length-1];
      const prev = peakByCycle[peakByCycle.length-2];
      if (last > prev && last >= 2) {
        const msg = `${s.icon} ${s.label}`;
        if (last >= RED_FLAG) flags.push({ label: msg });
        else insights.push({ type: "warning", label: msg });
      }
    }
  });

  return { insights, flags };
}

function FOLFOXTracker() {
  const [entries,setEntries]=useState([]);
  const [currentCycle,setCurrentCycle]=useState(1);
  const [cycleDay,setCycleDay]=useState(1);
  const [symptoms,setSymptoms]=useState({});
  const [resolved,setResolved]=useState({});
  const [notes,setNotes]=useState("");

  useEffect(()=>{
    (async()=>{
      try{
        const r=await window.storage.get(STORAGE_KEY);
        if(r?.value) setEntries(JSON.parse(r.value));
      }catch{}
    })();
  },[]);

  const setSym=(id,val)=>setSymptoms(s=>({...s,[id]:val}));

  const saveEntry=async()=>{
    const entry={
      id:Date.now(),
      date:new Date().toISOString(),
      cycle:currentCycle,
      cycleDay,
      symptoms,
      resolved,
      notes
    };

    const updated=[...entries,entry];
    setEntries(updated);
    await window.storage.set(STORAGE_KEY, JSON.stringify(updated));

    setSymptoms({});
    setResolved({});
    setNotes("");
  };

  return (
    <div style={{ color:"#fff", padding:20, fontFamily:"sans-serif" }}>
      <h2>FOLFOX Tracker</h2>

      <div>
        <button onClick={saveEntry}>Save Entry</button>
      </div>

      <pre>{JSON.stringify(entries,null,2)}</pre>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FOLFOXTracker />);

  </script>
</body>
</html>
