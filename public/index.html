<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemoJournal</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 18px;
  font-family: Inter, sans-serif;
  background: #f7f3ee;
  color: #2b2b2b;
}

/* soft paper texture */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(#e6dfd6 1px, transparent 1px);
  background-size: 18px 18px;
  opacity: 0.4;
  pointer-events: none;
}

h2 {
  font-family: "Yuji Syuku", serif;
  font-size: 28px;
  margin: 0 0 12px 0;
}

.card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(6px);
  border: 1px solid #e6ddd2;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.05);
}

button, input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid #d8cfc4;
  font-size: 14px;
  background: #fff;
}

button {
  background: #3b3b3b;
  color: white;
  border: none;
  font-weight: 500;
}

button:active {
  transform: scale(0.98);
}

.nav {
  display: flex;
  gap: 8px;
}

.nav button {
  flex: 1;
}

.entry {
  padding: 10px 0;
  border-bottom: 1px dashed #ddd;
}

.meta {
  font-size: 12px;
  color: #777;
}

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: #eee3d6;
  font-size: 11px;
  margin-left: 6px;
}
</style>
</head>

<body>

<h2>ChemoJournal</h2>

<div class="card">
  <div id="dateLabel"></div>

  <div class="nav">
    <button onclick="prev()">◀</button>
    <button onclick="today()">Today</button>
    <button onclick="next()">▶</button>
  </div>
</div>

<div class="card">
  <input id="symptom" placeholder="How are you feeling?">

  <select id="severity">
    <option value="1">1 - very mild</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5 - moderate</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10 - severe</option>
  </select>

  <button onclick="addEntry()">Add Entry</button>
</div>

<div class="card">
  <div id="list"></div>
</div>

let currentDate = new Date();

  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}

  localStorage.setItem("cj_data", JSON.stringify(data));
}
