<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #f5f1ea;
  color: #2b2b2b;
}

/* Japanese paper feel */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(#e7dfd6 1px, transparent 1px),
    linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 18px 18px;
  opacity: 0.6;
  pointer-events: none;
}

h1 {
  font-family: "Yuji Syuku", serif;
  font-size: 30px;
  margin: 10px 0;
}

.wrap {
  padding: 16px;
  max-width: 720px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.9);
  border-radius: 16px;
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid #e6ddd2;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.row {
  display: flex;
  gap: 8px;
}

button, input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #d8cfc4;
  font-size: 14px;
  box-sizing: border-box;
}

button {
  background: #2f2f2f;
  color: white;
  border: none;
}

button:active { transform: scale(0.98); }

.small {
  font-size: 12px;
  color: #777;
}

.tag {
  display:inline-block;
  padding:2px 8px;
  background:#eee2d6;
  border-radius:999px;
  font-size:11px;
  margin-left:6px;
}

.entry {
  border-bottom: 1px dashed #ddd;
  padding: 8px 0;
}
</style>
</head>

<body>

<div class="wrap">

<h1>ChemoJournal</h1>

<div class="card">
  <div id="dateLabel"></div>

  <div class="row">
    <button onclick="changeDay(-1)">‹</button>
    <button onclick="goToday()">Today</button>
    <button onclick="changeDay(1)">›</button>
  </div>
</div>

<div class="card">
  <div class="small">Symptom</div>
  <input id="symptom" placeholder="Enter symptom..." />

  <div class="small">Severity (1–10)</div>
  <select id="severity"></select>

  <div class="small">Mood</div>
  <select id="mood">
    <option>Neutral</option>
    <option>Good</option>
    <option>Bad</option>
    <option>Anxious</option>
    <option>Tired</option>
  </select>

  <div class="small">Medication</div>
  <input id="med" placeholder="e.g. Zofran, Tylenol..." />

  <div class="small">Notes</div>
  <textarea id="notes" rows="3" placeholder="Write anything..."></textarea>

  <button onclick="addEntry()">Add Entry</button>
</div>

<div class="card">
  <div id="entries"></div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("cj_full") || "{}");
let current = new Date();

function key(d){
  return d.toISOString().split("T")[0];
}

function save(){
  localStorage.setItem("cj_full", JSON.stringify(data));
}

function initSeverity(){
  let sel = document.getElementById("severity");
  for(let i=1;i<=10;i++){
    let o=document.createElement("option");
    o.value=i;
    o.textContent=i;
    sel.appendChild(o);
  }
}

function label(){
  document.getElementById("dateLabel").innerText =
    current.toDateString();
}

function getDay(){
  let k = key(current);
  if(!data[k]) data[k] = [];
  return data[k];
}

function render(){
  label();
  let list = document.getElementById("entries");
  list.innerHTML = "";

  let day = getDay();

  if(day.length === 0){
    list.innerHTML = "<div class='small'>No entries yet.</div>";
    return;
  }

  day.slice().reverse().forEach(e=>{
    let div=document.createElement("div");
    div.className="entry";

    div.innerHTML = `
      <div><b>${e.symptom || "Entry"}</b>
      <span class="tag">S:${e.severity}</span>
      <span class="tag">${e.mood}</span></div>
      <div class="small">${e.med || ""}</div>
      <div class="small">${e.notes || ""}</div>
      <div class="small">${new Date(e.time).toLocaleString()}</div>
    `;

    list.appendChild(div);
  });
}

function addEntry(){
  let obj = {
    symptom: symptom.value,
    severity: severity.value,
    mood: mood.value,
    med: med.value,
    notes: notes.value,
    time: Date.now()
  };

  if(!obj.symptom && !obj.notes) return;

  getDay().push(obj);
  save();

  symptom.value="";
  med.value="";
  notes.value="";

  render();
}

function changeDay(n){
  current.setDate(current.getDate()+n);
  render();
}

function goToday(){
  current = new Date();
  render();
}

initSeverity();
render();
</script>

</body>
</html>
