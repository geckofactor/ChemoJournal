<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f6f3ef;
    color: #2b2b2b;
  }

  .container {
    max-width: 800px;
    margin: auto;
    padding: 16px;
  }

  .title {
    font-size: 22px;
    font-weight: 600;
    margin: 10px 0 15px;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  button {
    background: #2b2b2b;
    color: white;
    border: none;
    cursor: pointer;
  }

  .row {
    display: flex;
    gap: 8px;
  }

  .row button {
    flex: 1;
  }

  .entry {
    padding: 10px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }

  .meta {
    font-size: 12px;
    color: #666;
  }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    background: #eee;
    margin-left: 6px;
  }
</style>
</head>

<body>
<div class="container">

  <div class="title">🌿 ChemoJournal</div>

  <!-- NAV -->
  <div class="card">
    <div class="row">
      <button onclick="changeDay(-1)">⬅</button>
      <button onclick="goToday()">Today</button>
      <button onclick="changeDay(1)">➡</button>
    </div>
    <div class="meta" id="dateLabel"></div>
  </div>

  <!-- INPUT -->
  <div class="card">
    <input id="symptom" placeholder="Symptom (e.g. fatigue)" />

    <select id="severity">
      <option value="1">Severity 1</option>
      <option value="2">Severity 2</option>
      <option value="3">Severity 3</option>
      <option value="4">Severity 4</option>
      <option value="5">Severity 5</option>
      <option value="6">Severity 6</option>
      <option value="7">Severity 7</option>
      <option value="8">Severity 8</option>
      <option value="9">Severity 9</option>
      <option value="10">Severity 10</option>
    </select>

    <select id="timeBlock">
      <option>Morning 🌅</option>
      <option>Afternoon 🌤</option>
      <option>Night 🌙</option>
    </select>

    <button onclick="addEntry()">Add Entry</button>
  </div>

  <!-- ENTRIES -->
  <div class="card">
    <div class="meta">Entries</div>
    <div id="entries"></div>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("cj_data") || "[]");

let currentDate = new Date();

function formatDate(d) {
  return d.toISOString().split("T")[0];
}

function save() {
  localStorage.setItem("cj_data", JSON.stringify(data));
}

function goToday() {
  currentDate = new Date();
  render();
}

function changeDay(offset) {
  currentDate.setDate(currentDate.getDate() + offset);
  render();
}

function addEntry() {
  const symptom = document.getElementById("symptom").value;
  const severity = document.getElementById("severity").value;
  const timeBlock = document.getElementById("timeBlock").value;

  if (!symptom) return;

  data.push({
    symptom,
    severity,
    timeBlock,
    date: formatDate(currentDate),
