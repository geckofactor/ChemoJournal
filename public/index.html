<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: linear-gradient(180deg, #f6f1ea, #efe7dc);
  color: #2a2a2a;
}

/* soft paper feel (NO GRID) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,0.6), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,0.4), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(255,255,255,0.3), transparent 50%);
  pointer-events: none;
  opacity: 0.9;
}

/* subtle sakura corner graphic */
body::after {
  content: "❀";
  position: fixed;
  bottom: 14px;
  right: 18px;
  font-size: 30px;
  opacity: 0.12;
  pointer-events: none;
}

.container {
  max-width: 760px;
  margin: auto;
  padding: 18px;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.title {
  font-size: 32px;
  font-family: Georgia, serif;
  letter-spacing: 0.5px;
}

.subtitle {
  font-size: 12px;
  opacity: 0.6;
}

/* cards */
.card {
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(210, 195, 175, 0.6);
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow:
    0 10px 25px rgba(0,0,0,0.06),
    inset 0 1px 0 rgba(255,255,255,0.8);
  backdrop-filter: blur(8px);
}

/
