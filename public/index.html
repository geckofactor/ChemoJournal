<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ChemoJournal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f8f4ec;
      color: #2a2a2a;
    }

    header {
      padding: 18px;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      background: #fffaf2;
      border-bottom: 1px solid #e8dfd1;
      letter-spacing: 0.5px;
    }

    .calendar {
      display: flex;
      gap: 10px;
      padding: 12px;
      overflow-x: auto;
      background: #fffaf2;
      border-bottom: 1px solid #e8dfd1;
    }

    .day {
      min-width: 68px;
      text-align: center;
      padding: 10px;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #e8dfd1;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .day.active {
      background: #c7a77a;
      color: white;
      border: none;
    }

    .container {
      max-width: 720px;
      margin: auto;
      padding: 16px;
    }

    /* ✨ Paper page feel */
    .page {
      background: #fffdf8;
      border: 1px solid #e8dfd1;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      margin-bottom: 10px;
    }

    input, textarea {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #e5dac8;
      background: #fff;
      font-size: 13px;
    }

    textarea {
      height: 70px;
    }

    button {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: none;
      background: #b8926b;
      color: white;
      font-weight: 500;
      margin-top: 6px;
      cursor: pointer;
    }

    .entry {
      padding: 12px;
      border-bottom: 1px dashed #e5dac8;
    }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f0e6d8;
      font-size: 11px;
      margin-left: 6px;
    }

    .meta {
      font-size: 11px;
      opacity: 0.65;
      margin-top: 2px;
    }

    .section {
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<header>ChemoJournal</header>

<div class="calendar" id="calendar"></div>

<div class="container">

  <div class="page">

    <div class="title" id="selectedDateLabel">Today</div>

    <div class="section">
      <input id="symptom" placeholder="Write symptom..." />
      <input id="severity" type="number" placeholder="Severity (1–10)" />
      <input id="cycleDay" type="number" placeholder="Cycle Day" />
      <textarea id="notes" placeholder="Journal notes..."></textarea>

      <button onclick="addEntry()">Add Entry</button>
    </div>

  </div>

  <div style="height:12px"></div>

  <div class="page">
    <div class="title">Entries</div>
    <div id="entries"></div>
  </div>

</div>

<script>
  let data = JSON.parse(localStorage.getItem("chemoData") || "[]");
  let selectedDate = new Date().toISOString().split("T")[0];

  function last7() {
    let arr = [];
    for (let i=6;i>=0;i--) {
      let d = new Date();
      d.setDate(d.getDate()-i);
      arr.push(d.toISOString().split("T")[0]);
    }
    return arr;
  }

  function renderCalendar() {
    const c = document.getElementById("calendar");
    c.innerHTML = "";

    last7().forEach(date => {
      let el = document.createElement("div");
      el.className = "day" + (date === selectedDate ? " active" : "");
      el.innerHTML = date.slice(5);
      el.onclick = () => {
        selectedDate = date;
        document.getElementById("selectedDateLabel").innerText = date;
        renderCalendar();
        render();
      };
      c.appendChild(el);
    });
  }

  function render() {
    const container = document.getElementById("entries");
    container.innerHTML = "";

    let filtered = data.filter(e => e.date === selectedDate);

    if (filtered.length === 0) {
      container.innerHTML = "<div class='meta'>No entries yet for this day</div>";
      return;
    }

    filtered.slice().reverse().forEach(e => {
      container.innerHTML += `
        <div class="entry">
          <div><b>${e.symptom}</b><span class="pill">${e.severity}/10</span></div>
          <div class="meta">Cycle Day ${e.cycleDay}</div>
          <div>${e.notes}</div>
        </div>
      `;
    });
  }

  function addEntry() {
    let entry = {
      date: selectedDate,
      symptom: symptom.value,
      severity: severity.value,
      cycleDay: cycleDay.value,
      notes: notes.value,
      time: new Date().toISOString()
    };

    if (!entry.symptom) return;

    data.push(entry);
    localStorage.setItem("chemoData", JSON.stringify(data));

    symptom.value = "";
    severity.value = "";
    cycleDay.value = "";
    notes.value = "";

    render();
  }

  renderCalendar();
  render();
</script>

</body>
</html>
