<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemoJournal</title>

<style>
body {
  font-family: Georgia, serif;
  margin: 0;
  padding: 16px;
  background: #f4f1ea;
  color: #2a2a2a;
}

.card {
  background: #fffdf9;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  border: 1px solid #e6dfd4;
}

button {
  padding: 10px;
  margin-top: 6px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: #2f2f2f;
  color: white;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.entry {
  padding: 10px;
  border-bottom: 1px dashed #ddd;
}

.meta {
  font-size: 12px;
  color: #666;
}

.pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: #eee6da;
  font-size: 11px;
  margin-left: 6px;
}
</style>
</head>

<body>

<h2>ChemoJournal</h2>

<div class="card">
  <div id="dateLabel"></div>
  <button onclick="prev()">Previous Day</button>
  <button onclick="next()">Next Day</button>
</div>

<div class="card">
  <input id="symptom" placeholder="Enter symptom">

  <!-- FIXED DROPDOWN (this was your bug) -->
  <select id="severity">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10</option>
  </select>

  <button onclick="add()">Add Entry</button>
</div>

<div class="card">
  <div id="list"></div>
</div>

<script>
let data = [];
let date = new Date();

/* SAFE LOAD */
try {
  const saved = localStorage.getItem("cj");
  if (saved) data = JSON.parse(saved);
  if (!Array.isArray(data)) data = [];
} catch (e) {
  data = [];
}

function fmt(d){
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}

function save(){
  localStorage.setItem("cj", JSON.stringify(data));
}

function next(){
  date.setDate(date.getDate() + 1);
  render();
}

function prev(){
  date.setDate(date.getDate() - 1);
  render();
}

function add(){
  const symptom = document.getElementById("symptom").value.trim();
  const severity = document.getElementById("severity").value;

  if(!symptom) return;

  data.push({
    symptom,
    severity,
    date: fmt(date),
    time: Date.now()
  });

  document.getElementById("symptom").value = "";
  save();
  render();
}

function render(){
  document.getElementById("dateLabel").innerText =
    date.toDateString();

  const box = document.getElementById("list");
  box.innerHTML = "";

  const today = fmt(date);
  const filtered = data.filter(x => x.date === today);

  if(filtered.length === 0){
    box.innerHTML = "<div class='meta'>No entries yet</div>";
    return;
  }

  filtered.slice().reverse().forEach(e => {
    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <b>${e.symptom}</b>
      <span class="pill">Severity ${e.severity}</span><br>
      <span class="meta">${new Date(e.time).toLocaleString()}</span>
    `;

    box.appendChild(div);
  });
}

render();
</script>

</body>
</html>
