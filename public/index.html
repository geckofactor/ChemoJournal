<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemoJournal</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Inter, sans-serif;
  background: #f6f1ea;
  color: #2b2b2b;
}

/* Washi paper texture */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(#e7dfd6 1px, transparent 1px),
    linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 18px 18px;
  pointer-events: none;
  opacity: 0.6;
}

h1 {
  font-family: "Yuji Syuku", serif;
  font-size: 32px;
  margin: 0 0 12px 0;
}

.card {
  background: rgba(255,255,255,0.88);
  border: 1px solid #e6ddd2;
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
  backdrop-filter: blur(6px);
}

input, select, button {
  width: 100%;
  padding: 11px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #d8cfc4;
  font-size: 14px;
  box-sizing: border-box;
}

button {
  background: #2f2f2f;
  color: white;
  border: none;
  font-weight: 500;
}

button:active {
  transform: scale(0.98);
}

.nav {
  display: flex;
  gap: 8px;
}

.nav button {
  flex: 1;
}

.entry {
  padding: 10px 0;
  border-bottom: 1px dashed #ddd;
}

.meta {
  font-size: 12px;
  color: #777;
}

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: #eee2d6;
  font-size: 11px;
  margin-left: 6px;
}
</style>
</head>

<body>

<h1>ChemoJournal</h1>

<div class="card">
  <div id="dateLabel"></div>

  <div class="nav">
    <button onclick="prev()">‹</button>
    <button onclick="today()">Today</button>
    <button onclick="next()">›</button>
  </div>
</div>

<div class="card">
  <input id="symptom" placeholder="How are you feeling today?">

  <select id="severity">
    <option value="1">1 - very mild</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5 - moderate</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10 - severe</option>
  </select>

  <button onclick="addEntry()">Add Entry</button>
</div>

<div class="card">
  <div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("cj_final") || "[]");
let currentDate = new Date();

function formatDate(d){
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}

function save(){
  localStorage.setItem("cj_final", JSON.stringify(data));
}

function render(){
  document.getElementById("dateLabel").innerText =
    currentDate.toDateString();

  const list = document.getElementById("list");
  list.innerHTML = "";

  const filtered = data.filter(e => e.date === formatDate(currentDate));

  if(filtered.length === 0){
    list.innerHTML = "No entries for today ✿";
    return;
  }

  filtered.slice().reverse().forEach(e => {
    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <div>
        ${e.symptom}
        <span class="tag">Severity ${e.severity}</span>
      </div>
      <div class="meta">${new Date(e.time).toLocaleString()}</div>
    `;

    list.appendChild(div);
  });
}

function addEntry(){
  const symptom = document.getElementById("symptom").value.trim();
  const severity = document.getElementById("severity").value;

  if(!symptom) return;

  data.push({
    symptom,
    severity,
    date: formatDate(currentDate),
    time: Date.now()
  });

  save();
  document.getElementById("symptom").value = "";
  render();
}

function next(){
  currentDate.setDate(currentDate.getDate()+1);
  render();
}

function prev(){
  currentDate.setDate(currentDate.getDate()-1);
  render();
}

function today(){
  currentDate = new Date();
  render();
}

render();
</script>

</body>
</html>
