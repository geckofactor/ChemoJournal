<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ChemoJournal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f6f1e7; /* paper-like */
      color: #2b2b2b;
    }

    header {
      padding: 18px 22px;
      font-size: 20px;
      font-weight: 500;
      background: #fffaf3;
      border-bottom: 1px solid #e7dfd2;
    }

    .container {
      max-width: 720px;
      margin: auto;
      padding: 18px;
    }

    .card {
      background: #fffaf3;
      border: 1px solid #e7dfd2;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    h3 {
      margin-top: 0;
      font-size: 16px;
      font-weight: 500;
    }

    input, textarea {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #e3d8c8;
      background: #fff;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #c8a97e; /* soft planner accent */
      color: white;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover {
      background: #b8946d;
    }

    .entry {
      padding: 10px;
      border-bottom: 1px dashed #e3d8c8;
      font-size: 14px;
    }

    .meta {
      font-size: 12px;
      opacity: 0.7;
    }

  </style>
</head>

<body>
  <header>ChemoJournal</header>

  <div class="container">

    <div class="card">
      <h3>Today's Entry</h3>

      <input id="symptom" placeholder="Symptom (e.g. nausea)" />
      <input id="severity" type="number" placeholder="Severity (1–10)" />
      <input id="cycleDay" type="number" placeholder="Cycle Day" />
      <textarea id="notes" placeholder="Notes / journal entry..."></textarea>

      <button onclick="addEntry()">Add to Journal</button>
    </div>

    <div class="card">
      <h3>Journal History</h3>
      <div id="entries"></div>
    </div>

  </div>

  <script>
    let data = JSON.parse(localStorage.getItem("chemoData") || "[]");

    function render() {
      const container = document.getElementById("entries");
      container.innerHTML = "";

      data.slice().reverse().forEach(e => {
        container.innerHTML += `
          <div class="entry">
            <div><b>${e.symptom}</b> — Severity ${e.severity}/10</div>
            <div class="meta">Cycle Day ${e.cycleDay}</div>
            <div class="meta">${e.notes}</div>
          </div>
        `;
      });
    }

    function addEntry() {
      const entry = {
        symptom: document.getElementById("symptom").value,
        severity: document.getElementById("severity").value,
        cycleDay: document.getElementById("cycleDay").value,
        notes: document.getElementById("notes").value,
        time: new Date().toISOString()
      };

      if (!entry.symptom) return;

      data.push(entry);
      localStorage.setItem("chemoData", JSON.stringify(data));

      document.getElementById("symptom").value = "";
      document.getElementById("severity").value = "";
      document.getElementById("cycleDay").value = "";
      document.getElementById("notes").value = "";

      render();
    }

    render();
  </script>
</body>
</html>
