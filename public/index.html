<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemoJournal</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 16px;
  background: #f4f1ea;
}

.card {
  background: white;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin: 4px 0;
  width: 100%;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
}
</style>
</head>

<body>

<h2>ChemoJournal</h2>

<div class="card">
  <div id="dateLabel"></div>
  <button onclick="prev()">Prev</button>
  <button onclick="next()">Next</button>
</div>

<div class="card">
  <input id="symptom" placeholder="symptom">
  <select id="severity">
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>5</option><option>6</option>
    <option>7</option><option>8</option><option>9</option><option>10</option>
  </select>

  <button onclick="add()">Add</button>
</div>

<div class="card">
  <div id="list"></div>
</div>

<script>
let data = [];
let date = new Date();

/* SAFE LOAD */
try {
  const saved = localStorage.getItem("cj");
  if (saved) data = JSON.parse(saved);
  if (!Array.isArray(data)) data = [];
} catch (e) {
  data = [];
}

/* FORMAT */
function fmt(d){
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

/* SAVE */
function save(){
  localStorage.setItem("cj", JSON.stringify(data));
}

/* NAV */
function next(){
  date.setDate(date.getDate()+1);
  render();
}

function prev(){
  date.setDate(date.getDate()-1);
  render();
}

/* ADD */
function add(){
  const s = document.getElementById("symptom").value;
  const sev = document.getElementById("severity").value;

  if(!s) return;

  data.push({
    symptom:s,
    severity:sev,
    date:fmt(date),
    time:Date.now()
  });

  document.getElementById("symptom").value="";
  save();
  render();
}

  document.getElementById("dateLabel").innerText =
    date.toDateString();

  box.innerHTML="";

  if(filtered.length===0){
