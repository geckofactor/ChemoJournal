<title>ChemoJournal</title>

body {

}

.card {

  padding: 14px;
  margin-bottom: 12px;

}

button {
  padding: 10px;
  margin-top: 6px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: #2f2f2f;
  color: white;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.entry {
  padding: 10px;
  border-bottom: 1px dashed #ddd;
}

.meta {
  font-size: 12px;
  color: #666;
}

.pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: #eee6da;
  font-size: 11px;
  margin-left: 6px;
}
</style>
</head>
