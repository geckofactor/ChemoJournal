<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f6f3ef;
    color: #2b2b2b;
  }

  .container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
  }

  .title {
    font-size: 22px;
    font-weight: 600;
    margin: 20px 0 10px;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  button {
    background: #2b2b2b;
    color: white;
    border: none;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.9;
  }

  .entry {
    padding: 10px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }

  .meta {
    font-size: 13px;
    color: #666;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  @media (min-width: 800px) {
    .grid {
      grid-template-columns: 1fr 1fr;
    }
  }
</style>
</head>

<body>
<div class="container">

  <div class="title">🌿 ChemoJournal</div>

  <!-- INPUT CARD -->
  <div class="card">
    <div class="meta">Log today’s symptom</div>

    <input id="symptom" placeholder="Symptom (e.g. nausea)" />
    
    <select id="severity">
      <option value="1">Severity 1</option>
      <option value="2">Severity 2</option>
      <option value="3">Severity 3</option>
      <option value="4">Severity 4</option>
      <option value="5">Severity 5</option>
      <option value="6">Severity 6</option>
      <option value="7">Severity 7</option>
      <option value="8">Severity 8</option>
      <option value="9">Severity 9</option>
      <option value="10">Severity 10</option>
    </select>

    <button onclick="addEntry()">Add Entry</button>
  </div>

  <div class="grid">

    <!-- ENTRIES -->
    <div class="card">
      <div class="title">Entries</div>
      <div id="entries"></div>
    </div>

    <!-- INSIGHTS -->
    <div class="card">
      <div class="title">Insights</div>
      <div id="insights" class="meta"></div>
    </div>

  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("journal") || "[]");

function save() {
  localStorage.setItem("journal", JSON.stringify(data));
}

function addEntry() {
  let symptom = document.getElementById("symptom").value;
  let severity = document.getElementById("severity").value;

  if (!symptom) return;

  data.push({
    symptom,
    severity,
    time: new Date().toISOString()
  });

  document.getElementById("symptom").value = "";
  save();
  render();
}

function render() {
  renderEntries();
  renderInsights();
}

function renderEntries() {
  let box = document.getElementById("entries");
  box.innerHTML = "";

  if (data.length === 0) {
    box.innerHTML = "<div class='meta'>No entries yet</div>";
    return;
  }

  data.slice().reverse().forEach(e => {
    let div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <b>${e.symptom}</b><br>
      Severity: ${e.severity}<br>
      <span class="meta">${new Date(e.time).toLocaleString()}</span>
    `;

    box.appendChild(div);
  });
}
