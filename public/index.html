<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f6f3ef;
    color: #2b2b2b;
  }

  .container {
    max-width: 900px;
    margin: auto;
    padding: 16px;
  }

  .title {
    font-size: 22px;
    font-weight: 600;
    margin: 10px 0;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  button {
    background: #2b2b2b;
    color: white;
    border: none;
    cursor: pointer;
  }

  .row {
    display: flex;
    gap: 10px;
  }

  .row button {
    flex: 1;
  }

  .entry {
    padding: 10px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }

  .meta {
    font-size: 12px;
    color: #666;
  }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    background: #eee;
  }

  .dateHeader {
    font-weight: 600;
    margin-bottom: 8px;
  }
</style>
</head>

<body>
<div class="container">

  <div class="title">🌿 ChemoJournal</div>

  <!-- DATE NAV -->
  <div class="card">
    <div class="row">
      <button onclick="changeDay(-1)">⬅ Prev</button>
      <button onclick="today()">Today</button>
      <button onclick="changeDay(1)">Next ➡</button>
    </div>
    <div class="meta" id="currentDate"></div>
  </div>

  <!-- INPUT -->
  <div class="card">
    <input id="symptom" placeholder="Symptom (e.g. fatigue)" />

    <select id="severity">
      ${""}
    </select>

    <select id="timeBlock">
      <option value="Morning">Morning 🌅</option>
      <option value="Afternoon">Afternoon 🌤</option>
      <option value="Night">Night 🌙</option>
    </select>

    <button onclick="addEntry()">Add Entry</button>
  </div>

  <!-- ENTRIES -->
  <div class="card">
    <div class="dateHeader">Entries</div>
    <div id="entries"></div>
  </div>

  <!-- CHART -->
  <div class="card">
    <div class="dateHeader">Severity Trend</div>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("journal") || "[]");

let currentDate = new Date();

function save() {
  localStorage.setItem("journal", JSON.stringify(data));
}

function formatDate(d) {
  return d.toISOString().split("T")[0];
}

function today() {
  currentDate = new Date();
  render();
}

function changeDay(offset) {
  currentDate.setDate(currentDate.getDate() + offset);
  render();
}

function addEntry() {
  let symptom = document.getElementById("symptom").value;
  let severity = document.getElementById("severity").value;
  let timeBlock = document.getElementById("timeBlock").value;

  if (!symptom) return;

  data.push({
    symptom,
    severity,
    timeBlock,
    date: formatDate(currentDate),
    time: new Date().toISOString()
  });

  document.getElementById("symptom").value = "";
  save();
  render();
}

function getDayData() {
  return data.filter(e => e.date === formatDate(currentDate));
}

function render() {
  document.getElementById("currentDate").innerText =
    "Viewing: " + formatDate(currentDate);

  renderEntries();
  renderChart();
}

function renderEntries() {
  let box = document.getElementById("entries");
  let dayData = getDayData();

  box.innerHTML = "";

  if (dayData.length === 0) {
    box.innerHTML = "<div class='meta'>No entries for this day</div>";
    return;
  }

  dayData.slice().reverse().forEach(e => {
    let div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <b>${e.symptom}</b>
      <span class="pill">${e.timeBlock}</span><br>
      Severity: ${e.severity}<br>
      <span class="meta">${new Date(e.time).toLocaleTimeString()}</span>
    `;

    box.appendChild(div);
  });
}

function renderChart() {
  let ctx = document.getElementById("chart");

  let dayData = getDayData();

  let labels = dayData.map(e => e.timeBlock);
  let values = dayData.map(e => Number(e.severity));

  if (window.myChart) window.myChart.destroy();

  window.myChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "Severity",
        data: values,
        fill: false
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { beginAtZero: true, max: 10 }
      }
    }
  });
}

render();
</script>

</body>
</html>
