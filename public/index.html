<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemoJournal</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 16px;
  background: #f5f3ef;
  color: #222;
}

.card {
  background: white;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

h2 {
  margin-top: 0;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  font-size: 14px;
}

button {
  background: #222;
  color: white;
  border: none;
}

button.secondary {
  background: #666;
}

.entry {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.meta {
  font-size: 12px;
  color: #666;
}

.nav {
  display: flex;
  gap: 8px;
}

.nav button {
  flex: 1;
}
</style>
</head>

<body>

<h2>ChemoJournal</h2>

<div class="card">
  <div id="dateLabel"></div>

  <div class="nav">
    <button onclick="prev()">Prev</button>
    <button onclick="today()">Today</button>
    <button onclick="next()">Next</button>
  </div>
</div>

<div class="card">
  <input id="symptom" placeholder="Symptom">

  <select id="severity">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10</option>
  </select>

  <button onclick="addEntry()">Add Entry</button>
</div>

<div class="card">
  <div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("cj_data") || "[]");
let currentDate = new Date();

function formatDate(d) {
  return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
}

function save() {
  localStorage.setItem("cj_data", JSON.stringify(data));
}

function render() {
  document.getElementById("dateLabel").innerText =
    currentDate.toDateString();

  const list = document.getElementById("list");
  list.innerHTML = "";

  const filtered = data.filter(e => e.date === formatDate(currentDate));

  if (filtered.length === 0) {
    list.innerHTML = "No entries for this day.";
    return;
  }

  filtered.slice().reverse().forEach(e => {
    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <b>${e.symptom}</b>
      <div>Severity: ${e.severity}</div>
      <div class="meta">${new Date(e.time).toLocaleString()}</div>
    `;

    list.appendChild(div);
  });
}

function addEntry() {
  const symptom = document.getElementById("symptom").value.trim();
  const severity = document.getElementById("severity").value;

  if (!symptom) return;

  data.push({
    symptom,
    severity,
    date: formatDate(currentDate),
    time: Date.now()
  });

  save();
  document.getElementById("symptom").value = "";
  render();
}

function next() {
  currentDate.setDate(currentDate.getDate() + 1);
  render();
}

function prev() {
  currentDate.setDate(currentDate.getDate() - 1);
  render();
}

function today() {
  currentDate = new Date();
  render();
}

render();
</script>

</body>
</html>
