<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: linear-gradient(180deg, #f7f2eb, #efe6db);
  color: #2a2a2a;
}

/* soft paper sheet */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.7), transparent 40%),
              radial-gradient(circle at 70% 80%, rgba(255,255,255,0.4), transparent 50%);
  pointer-events: none;
}

/* tiny corner accent */
body::after {
  content: "✿";
  position: fixed;
  bottom: 16px;
  right: 16px;
  font-size: 26px;
  opacity: 0.12;
}

.container {
  max-width: 720px;
  margin: auto;
  padding: 20px;
}

/* HEADER */
.header {
  margin-bottom: 18px;
}

.title {
  font-size: 32px;
  font-family: Georgia, serif;
  letter-spacing: 0.5px;
}

.subtitle {
  font-size: 12px;
  opacity: 0.6;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.93);
  border: 1px solid #e3d5c6;
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.05);
}

/* PILLS (planner aesthetic) */
button {
  border: none;
  border-radius: 999px;
  padding: 10px 12px;
  margin-top: 8px;
  width: 100%;
  background: #2b2b2b;
  color: white;
  font-weight: 500;
  transition: 0.15s ease;
}

button:hover {
  transform: translateY(-1px);
  background: #1f1f1f;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid #d7c8b6;
  background: rgba(255,255,255,0.9);
  font-size: 14px;
}

/* ENTRY STYLE */
.entry {
  padding: 10px 0;
  border-bottom: 1px dashed #e4d6c6;
}

.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  background: #f0e3d5;
  font-size: 11px;
  margin-left: 6px;
}

/* NAV ROW */
.row {
  display: flex;
  gap: 8px;
}

.row button {
  width: 100%;
}

/* subtle label style */
.label {
  font-size: 11px;
  opacity: 0.55;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">ChemoJournal</div>
    <div class="subtitle">gentle daily tracking • soft health journal</div>
  </div>

  <div class="card">
    <div id="dateLabel"></div>

    <div class="row">
      <button onclick="shift(-1)">‹</button>
      <button onclick="today()">Today</button>
      <button onclick="shift(1)">›</button>
    </div>
  </div>

  <div class="card">
    <div class="label">Symptom</div>
    <input id="symptom" placeholder="How are you feeling today?" />

    <div class="label">Severity</div>
    <select id="severity"></select>

    <div class="label">Mood</div>
    <select id="mood">
      <option>Neutral</option>
      <option>Good</option>
      <option>Bad</option>
      <option>Anxious</option>
      <option>Tired</option>
    </select>

    <div class="label">Medication</div>
    <input id="med" placeholder="Optional medication" />

    <div class="label">Notes</div>
    <textarea id="notes" rows="3"></textarea>

    <button onclick="add()">Add Entry</button>
  </div>

  <div class="card">
    <div id="list"></div>
  </div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("CHEMOJOURNAL_DB") || "{}");
let date = new Date();

const symptom = document.getElementById("symptom");
const severity = document.getElementById("severity");
const mood = document.getElementById("mood");
const med = document.getElementById("med");
const notes = document.getElementById("notes");

function key(d){ return d.toISOString().split("T")[0]; }

function save(){
  localStorage.setItem("CHEMOJOURNAL_DB", JSON.stringify(db));
}

function getDay(){
  let k = key(date);
  if(!db[k]) db[k] = [];
  return db[k];
}

function initSeverity(){
  for(let i=1;i<=10;i++){
    let o=document.createElement("option");
    o.value=i;
    o.textContent=i;
    severity.appendChild(o);
  }
}

function render(){
  document.getElementById("dateLabel").innerText = date.toDateString();

  let list = document.getElementById("list");
  list.innerHTML = "";

  let day = getDay();

  if(!day.length){
    list.innerHTML = "<div style='opacity:0.6;font-size:13px;'>No entries yet.</div>";
    return;
  }

  day.slice().reverse().forEach(e=>{
    let div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <b>${e.symptom || "Entry"}</b>
      <span class="tag">${e.severity}/10</span>
      <span class="tag">${e.mood}</span>
      <div style="font-size:12px;opacity:0.7;margin-top:4px">${e.med || ""}</div>
      <div style="font-size:12px;opacity:0.7">${e.notes || ""}</div>
    `;

    list.appendChild(div);
  });
}

function add(){
  let obj = {
    symptom: symptom.value,
    severity: severity.value,
    mood: mood.value,
    med: med.value,
    notes: notes.value,
    time: Date.now()
  };

  if(!obj.symptom && !obj.notes) return;

  getDay().push(obj);
  save();

  symptom.value = "";
  med.value = "";
  notes.value = "";

  render();
}

function shift(n){
  date.setDate(date.getDate() + n);
  render();
}

function today(){
  date = new Date();
  render();
}

initSeverity();
render();
</script>

</body>
</html>
