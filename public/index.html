<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #f4f0e8;
  color: #2a2a2a;
}

/* Japanese stationery paper */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(#e6dccf 1px, transparent 1px),
    linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 18px 18px;
  opacity: 0.6;
  pointer-events: none;
}

.container {
  max-width: 760px;
  margin: auto;
  padding: 16px;
}

h1 {
  font-family: "Yuji Syuku", serif;
  font-size: 32px;
  margin: 10px 0 20px;
}

.card {
  background: rgba(255,255,255,0.92);
  border: 1px solid #e5dbcf;
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
  backdrop-filter: blur(6px);
}

.row {
  display: flex;
  gap: 8px;
}

button, input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid #d7cbbb;
  font-size: 14px;
  box-sizing: border-box;
}

button {
  background: #2f2f2f;
  color: white;
  border: none;
  cursor: pointer;
}

button:active { transform: scale(0.98); }

.small {
  font-size: 12px;
  color: #777;
}

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: #eee2d6;
  font-size: 11px;
  margin-left: 6px;
}

.entry {
  padding: 10px 0;
  border-bottom: 1px dashed #ddd;
}
</style>
</head>

<body>

<div class="container">

<h1>ChemoJournal</h1>

<div class="card">
  <div id="dateLabel"></div>

  <div class="row">
    <button onclick="shift(-1)">‹</button>
    <button onclick="today()">Today</button>
    <button onclick="shift(1)">›</button>
  </div>
</div>

<div class="card">
  <div class="small">Symptom</div>
  <input id="symptom" placeholder="Enter symptom..." />

  <div class="small">Severity</div>
  <select id="severity"></select>

  <div class="small">Mood</div>
  <select id="mood">
    <option>Neutral</option>
    <option>Good</option>
    <option>Bad</option>
    <option>Anxious</option>
    <option>Tired</option>
  </select>

  <div class="small">Medication</div>
  <input id="med" placeholder="Medication (optional)" />

  <div class="small">Notes</div>
  <textarea id="notes" rows="3"></textarea>

  <button onclick="add()">Add Entry</button>
</div>

<div class="card">
  <div id="list"></div>
</div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("CHEMOJOURNAL_DB") || "{}");
let date = new Date();

function key(d){
  return d.toISOString().split("T")[0];
}

function save(){
  localStorage.setItem("CHEMOJOURNAL_DB", JSON.stringify(db));
}

function initSeverity(){
  let s = document.getElementById("severity");
  for(let i=1;i<=10;i++){
    let o = document.createElement("option");
    o.value = i;
    o.textContent = i;
    s.appendChild(o);
  }
}

function getDay(){
  let k = key(date);
  if(!db[k]) db[k] = [];
  return db[k];
}

function render(){
  document.getElementById("dateLabel").innerText =
    date.toDateString();

  let list = document.getElementById("list");
  list.innerHTML = "";

  let day = getDay();

  if(day.length === 0){
    list.innerHTML = "<div class='small'>No entries for this day.</div>";
    return;
  }

  day.slice().reverse().forEach(e=>{
    let div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <div><b>${e.symptom || "Entry"}</b>
      <span class="tag">${e.severity}/10</span>
      <span class="tag">${e.mood}</span></div>
      <div class="small">${e.med || ""}</div>
      <div class="small">${e.notes || ""}</div>
      <div class="small">${new Date(e.time).toLocaleString()}</div>
    `;

    list.appendChild(div);
  });
}

function add(){
  let obj = {
    symptom: symptom.value,
    severity: severity.value,
    mood: mood.value,
    med: med.value,
    notes: notes.value,
    time: Date.now()
  };

  if(!obj.symptom && !obj.notes) return;

  getDay().push(obj);
  save();

  symptom.value = "";
  med.value = "";
  notes.value = "";

  render();
}

function shift(n){
  date.setDate(date.getDate() + n);
  render();
}

function today(){
  date = new Date();
  render();
}

initSeverity();
render();
</script>

</body>
</html>
