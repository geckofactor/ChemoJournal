<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #f4f0e8;
  color: #2a2a2a;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(#e6dccf 1px, transparent 1px),
    linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 18px 18px;
  opacity: 0.5;
  pointer-events: none;
}

.container { max-width: 760px; margin: auto; padding: 16px; }

h1 {
  font-size: 34px;
  margin: 10px 0 20px;
  font-family: Georgia, serif;
}

.card {
  background: rgba(255,255,255,0.94);
  border: 1px solid #e5dbcf;
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 14px;
}

button, input, select, textarea {
  width: 100%;
  padding: 11px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid #d7cbbb;
  font-size: 14px;
  box-sizing: border-box;
}

button {
  background: #222;
  color: white;
  border: none;
}

.small { font-size: 12px; color: #777; }

.entry { padding: 10px 0; border-bottom: 1px dashed #ddd; }

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  background: #eee2d6;
  font-size: 11px;
  margin-left: 6px;
}
</style>
</head>

<body>

<div class="container">
<h1>ChemoJournal</h1>

<div class="card">
  <div id="dateLabel"></div>

  <button onclick="shift(-1)">Back</button>
  <button onclick="today()">Today</button>
  <button onclick="shift(1)">Forward</button>
</div>

<div class="card">
  <input id="symptom" placeholder="Symptom"/>
  <select id="severity"></select>

  <select id="mood">
    <option>Neutral</option>
    <option>Good</option>
    <option>Bad</option>
    <option>Anxious</option>
    <option>Tired</option>
  </select>

  <input id="med" placeholder="Medication"/>
  <textarea id="notes" placeholder="Notes"></textarea>

  <button onclick="add()">Add Entry</button>
</div>

<div class="card">
  <div id="list"></div>
</div>

</div>

<script>
/* SAFE STORAGE WRAPPER (prevents blank screen crash) */
function loadDB(){
  try {
    return JSON.parse(localStorage.getItem("CHEMOJOURNAL_DB") || "{}");
  } catch (e) {
    console.log("DB reset due to error");
    return {};
  }
}

function saveDB(){
  try {
    localStorage.setItem("CHEMOJOURNAL_DB", JSON.stringify(db));
  } catch (e) {
    alert("Storage error: " + e.message);
  }
}

let db = loadDB();
let date = new Date();

const symptom = document.getElementById("symptom");
const severity = document.getElementById("severity");
const mood = document.getElementById("mood");
const med = document.getElementById("med");
const notes = document.getElementById("notes");

function key(d){ return d.toISOString().split("T")[0]; }

function getDay(){
  let k = key(date);
  if(!db[k]) db[k] = [];
  return db[k];
}

function initSeverity(){
  for(let i=1;i<=10;i++){
    let o=document.createElement("option");
    o.value=i;
    o.textContent=i;
    severity.appendChild(o);
  }
}

function render(){
  document.getElementById("dateLabel").innerText = date.toDateString();

  let list = document.getElementById("list");
  list.innerHTML = "";

  let day = getDay();

  if(!day.length){
    list.innerHTML = "<div class='small'>No entries.</div>";
    return;
  }

  day.slice().reverse().forEach(e=>{
    let div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <b>${e.symptom || "Entry"}</b>
      <span class="tag">${e.severity}/10</span>
      <span class="tag">${e.mood}</span>
      <div class="small">${e.med || ""}</div>
      <div class="small">${e.notes || ""}</div>
    `;

    list.appendChild(div);
  });
}

function add(){
  let obj = {
    symptom: symptom.value,
    severity: severity.value,
    mood: mood.value,
    med: med.value,
    notes: notes.value,
    time: Date.now()
  };

  if(!obj.symptom && !obj.notes) return;

  getDay().push(obj);
  saveDB();

  symptom.value = "";
  med.value = "";
  notes.value = "";

  render();
}

function shift(n){
  date.setDate(date.getDate() + n);
  render();
}

function today(){
  date = new Date();
  render();
}

/* INIT */
initSeverity();
render();
</script>

</body>
</html>
