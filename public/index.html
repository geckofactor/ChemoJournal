<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>FOLFOX Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; background: #080f18; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useCallback } = React;

const STORAGE_KEY = "folfox-v3-entries";
const CYCLE_KEY = "folfox-v3-cycle";

const NEUROPATHY_SITES = [
  { id: "hands", label: "Hands", icon: "✋" },
  { id: "feet", label: "Feet", icon: "🦶" },
  { id: "throat_cold", label: "Cold Throat", icon: "🌡" },
  { id: "balance", label: "Balance", icon: "⚖" },
  { id: "dexterity", label: "Dexterity", icon: "🤏" },
];

const OTHER_SYMPTOMS = [
  { id: "nausea", label: "Nausea", icon: "🤢" },
  { id: "fatigue", label: "Fatigue", icon: "😴" },
  { id: "mucositis", label: "Mucositis", icon: "👄" },
  { id: "diarrhea", label: "Diarrhea", icon: "🚽" },
  { id: "appetite", label: "Appetite Loss", icon: "🍽" },
  { id: "cognitive", label: "Brain Fog", icon: "🧠" },
];

const ALL_SYMPTOMS = [...NEUROPATHY_SITES, ...OTHER_SYMPTOMS];
const SEVERITY_LABELS = ["None","Mild","Moderate","Severe","Unbearable"];
const SEVERITY_COLORS = ["#2d4a3e","#4a7c59","#c9a84c","#d46b3a","#b03a2e"];
const RED_FLAG = 3;

// --- minimal insights (kept simple to avoid breakage)
function computeInsights(entries) {
  const insights = [];
  const flags = [];

  if (!entries.length) return { insights, flags };

  const latest = entries[entries.length - 1];

  ALL_SYMPTOMS.forEach(s => {
    const val = latest.symptoms?.[s.id] ?? 0;
    if (val >= RED_FLAG) {
      flags.push({
        label: `${s.icon} ${s.label}: ${SEVERITY_LABELS[val]}`,
        detail: val === 4 ? "Contact oncology now." : "Call if not improving."
      });
    }
  });

  return { insights, flags };
}

function SeveritySlider({ value, onChange, label }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display:"flex", justifyContent:"space-between" }}>
        <span style={{ fontSize:12, color:"#8a9bb0" }}>{label}</span>
        <span style={{ fontSize:11, color:SEVERITY_COLORS[value] }}>
          {SEVERITY_LABELS[value]}
        </span>
      </div>
      <input
        type="range"
        min={0}
        max={4}
        value={value}
        onChange={e => onChange(Number(e.target.value))}
        style={{ width:"100%" }}
      />
    </div>
  );
}

function FOLFOXTracker() {
  const [entries,setEntries]=useState([]);
  const [currentCycle,setCurrentCycle]=useState(1);
  const [cycleDay,setCycleDay]=useState(1);
  const [symptoms,setSymptoms]=useState({});
  const [notes,setNotes]=useState("");

  useEffect(()=>{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) setEntries(JSON.parse(saved));

    const cycle = localStorage.getItem(CYCLE_KEY);
    if(cycle){
      const c = JSON.parse(cycle);
      setCurrentCycle(c.cycle || 1);
      setCycleDay(c.day || 1);
    }
  },[]);

  const setSym = (id,val)=>setSymptoms(s=>({...s,[id]:val}));

  const saveEntry = ()=>{
    const entry = {
      id: Date.now(),
      date: new Date().toISOString(),
      cycle: currentCycle,
      cycleDay,
      symptoms,
      notes
    };

    const updated=[...entries,entry];
    setEntries(updated);

    localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
    localStorage.setItem(CYCLE_KEY, JSON.stringify({cycle:currentCycle,day:cycleDay}));

    setSymptoms({});
    setNotes("");
  };

  const {flags} = computeInsights(entries);

  return (
    <div style={{ padding:20, color:"#c8d8e8", fontFamily:"sans-serif" }}>

      <h2>FOLFOX Tracker</h2>
      <div>Cycle {currentCycle} · Day {cycleDay}</div>

      {flags.length>0 && (
        <div style={{background:"#2a0a0a",padding:10,marginTop:10}}>
          {flags.map((f,i)=><div key={i}>{f.label}</div>)}
        </div>
      )}

      <h3>Neuropathy</h3>
      {NEUROPATHY_SITES.map(s=>(
        <SeveritySlider
          key={s.id}
          label={s.label}
          value={symptoms[s.id]||0}
          onChange={v=>setSym(s.id,v)}
        />
      ))}

      <h3>Other</h3>
      {OTHER_SYMPTOMS.map(s=>(
        <SeveritySlider
          key={s.id}
          label={s.label}
          value={symptoms[s.id]||0}
          onChange={v=>setSym(s.id,v)}
        />
      ))}

      <textarea
        placeholder="Notes..."
        value={notes}
        onChange={e=>setNotes(e.target.value)}
        style={{width:"100%",marginTop:10}}
      />

      <button onClick={saveEntry} style={{marginTop:10}}>
        Save Entry
      </button>

      <h3>History</h3>
      {entries.map(e=>(
        <div key={e.id} style={{marginBottom:10}}>
          Day {e.cycleDay} — {new Date(e.date).toLocaleDateString()}
        </div>
      ))}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root"))
  .render(<FOLFOXTracker />);

</script>
</body>
</html>
