<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #f6f1e8;
  color: #1f1f1f;
}

.container {
  max-width: 720px;
  margin: auto;
  padding: 22px;
}

.title {
  font-size: 28px;
  font-weight: 600;
}

.subtitle {
  font-size: 12px;
  color: #666;
  margin-bottom: 16px;
}

.card {
  background: #fff;
  border: 1px solid #e2d9cc;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
}

/* inputs */
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #d6cdbc;
  font-size: 14px;
  background: #fff;
}

/* buttons */
button {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #2a2a2a;
  color: white;
  font-weight: 500;
}

/* ✅ FIXED SEGMENTED MENU */
.row {
  display: flex;
  justify-content: center;
  gap: 0;
  border: 1px solid #d6cdbc;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 8px;
}

.row button {
  flex: 1;
  margin: 0;
  border-radius: 0;
  border: none;
  border-right: 1px solid #d6cdbc;
  background: #fff;
  color: #2a2a2a;
  padding: 10px 0;
  font-weight: 500;
}

.row button:last-child {
  border-right: none;
}

.row button:hover {
  background: #f3ede3;
}

/* entries */
.entry {
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

.tag {
  font-size: 11px;
  background: #efe6d8;
  padding: 2px 7px;
  border-radius: 999px;
  margin-left: 6px;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">ChemoJournal</div>
  <div class="subtitle">daily symptom tracker</div>

  <div class="card">
    <div id="dateLabel">Loading...</div>

    <div class="row">
      <button onclick="shift(-1)">‹</button>
      <button onclick="today()">Today</button>
      <button onclick="shift(1)">›</button>
    </div>
  </div>

  <div class="card">
    <input id="symptom" placeholder="Symptom" />

    <select id="severity"></select>

    <select id="mood">
      <option>Neutral</option>
      <option>Good</option>
      <option>Bad</option>
      <option>Anxious</option>
      <option>Tired</option>
    </select>

    <input id="med
