<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #f4f0e8;
  color: #2a2a2a;
}

/* paper texture */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(#e6dccf 1px, transparent 1px),
    linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 18px 18px;
  opacity: 0.5;
  pointer-events: none;
}

/* decorative stamp */
body::after {
  content: "✿";
  position: fixed;
  bottom: 16px;
  right: 18px;
  font-size: 28px;
  opacity: 0.15;
  pointer-events: none;
}

.container {
  max-width: 760px;
  margin: auto;
  padding: 16px;
}

h1 {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 34px;
  letter-spacing: 1px;
  margin: 10px 0 20px;
  font-weight: 500;
  position: relative;
}

h1::after {
  content: "";
  display: block;
  width: 120px;
  height: 2px;
  background: linear-gradient(to right, #c8b7a6, transparent);
  margin-top: 6px;
}

.card {
  background: rgba(255,255,255,0.94);
  border: 1px solid #e5dbcf;
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow:
    0 8px 20px rgba(0,0,0,0.06),
    inset 0 1px 0 rgba(255,255,255,0.8);
  backdrop-filter: blur(6px);
}

.row {
  display: flex;
  gap: 10px;
}

button, input, select, textarea {
  width: 100%;
  padding: 11px;
  margin-top: 8px;
  border-radius: 14px;
  border: 1px solid #d7cbbb;
  font-size: 14px;
  box-sizing: border-box;
  background: rgba(255,255,255,0.9);
  transition: all 0.15s ease;
}

button {
  background: linear-gradient(145deg, #3a3a3a, #222);
  color: white;
  border: none;
  font-weight: 500;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.18);
}

button:active {
  transform: scale(0.98);
}

.small {
  font-size: 12px;
  color: #777;
}

.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  background: #eee2d6;
  font-size: 11px;
  margin-left: 6px;
}

.entry {
  padding: 10px 0;
  border-bottom: 1px dashed #ddd;
}
</style>
</head>

<body>

<div class="container">

<h1>ChemoJournal</h
