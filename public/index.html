<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemoJournal</title>

<style>
body {
  font-family: "Georgia", serif;
  margin: 0;
  padding: 16px;
  color: #2b2b2b;

  background: linear-gradient(180deg, #f7f3ea, #f2ecdf);
}

/* planner grid */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}

h2 {
  margin-top: 0;
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* cards */
.card {
  background: rgba(255, 252, 245, 0.92);
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;

  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 4px 18px rgba(0,0,0,0.06);
  backdrop-filter: blur(2px);
}

/* 🔥 FULL BUTTON REDESIGN (CLEARLY DIFFERENT NOW) */
button {
  padding: 12px;
  margin-top: 10px;
  width: 100%;
  border-radius: 16px;

  border: 2px solid #d4b483;

  background: linear-gradient(135deg, #fff3d6, #e6c98f);

  color: #3b2f1c;
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 0.4px;

  box-shadow: 0 6px 14px rgba(0,0,0,0.12);

  transition: all 0.15s ease;
}

button:active {
  transform: scale(0.98);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

button.secondary {
  background: linear-gradient(135deg, #d9d9d9, #a8a8a8);
