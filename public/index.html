<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ChemoJournal</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:16px;
  background:#f5f5f5;
}

.card{
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ddd;
}

button, input, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  box-sizing:border-box;
}

button{
  background:black;
  color:white;
  border:none;
  border-radius:6px;
}

.entry{
  padding:8px 0;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<h2>ChemoJournal TEST</h2>

<div class="card">
  <div id="dateLabel"></div>
  <button onclick="prev()">Prev</button>
  <button onclick="next()">Next</button>
  <button onclick="today()">Today</button>
</div>

<div class="card">
  <input id="symptom" placeholder="symptom">
  <select id="severity">
    <option>1</option><option>2</option><option>3</option>
    <option>4</option><option>5</option><option>6</option>
    <option>7</option><option>8</option><option>9</option><option>10</option>
  </select>
  <button onclick="add()">Add</button>
</div>

<div class="card">
  <div id="list">loading...</div>
</div>

<script>
let data = [];
let date = new Date();

try {
  data = JSON.parse(localStorage.getItem("cj") || "[]");
} catch(e){
  data = [];
}

function fmt(d){
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function save(){
  localStorage.setItem("cj", JSON.stringify(data));
}

function render(){
  document.getElementById("dateLabel").innerText = date.toDateString();

  const list = document.getElementById("list");
  list.innerHTML = "";

  const filtered = data.filter(x => x.date === fmt(date));

  if(filtered.length === 0){
    list.innerHTML = "No entries";
    return;
  }

  filtered.forEach(e => {
    const div = document.createElement("div");
    div.className = "entry";
    div.innerHTML = e.symptom + " (Severity " + e.severity + ")";
    list.appendChild(div);
  });
}

function add(){
  const symptom = document.getElementById("symptom").value;
  const severity = document.getElementById("severity").value;

  if(!symptom) return;

  data.push({
    symptom,
    severity,
    date: fmt(date),
    time: Date.now()
  });

  save();
  document.getElementById("symptom").value = "";
  render();
}

function next(){
  date.setDate(date.getDate()+1);
  render();
}
